<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Therapy Exam Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2336;
    --border: #2a3050;
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.1);
    --amber: #fbbf24;
    --violet: #a78bfa;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    padding-bottom: 100px;
  }

  header {
    background: linear-gradient(180deg, rgba(26,31,53,1) 0%, var(--bg) 100%);
    padding: 60px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .portal-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--teal);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(24px, 5vw, 36px);
    margin-bottom: 8px;
    color: #fff;
  }
  header h1 span { color: var(--teal); }

  .container {
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
  }
  .stat-value {
    display: block;
    font-size: 20px;
    font-weight: 700;
    color: var(--teal);
  }
  .stat-label { font-size: 12px; color: var(--muted); }

  .chapter-section {
    display: grid;
    gap: 12px;
  }
  
  .chapter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 20px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .chapter-card:hover {
    transform: translateX(4px);
    border-color: var(--teal);
    background: rgba(45,212,191,0.03);
  }

  .chapter-num {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    color: var(--teal);
    width: 60px;
  }

  .chapter-info { flex-grow: 1; }
  .chapter-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }
  .chapter-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .mini-tag {
    font-size: 10px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .btn-enter {
    background: var(--teal-dim);
    border: 1px solid var(--teal);
    color: var(--teal);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <div class="portal-label">Family Therapy Study Hub</div>
  <h1>가족치료 <span>기말고사</span> 포털</h1>
</header>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-value">12</span>
      <span class="stat-label">전체 범위</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" style="color:var(--amber)">3 / 12</span>
      <span class="stat-label">학습 완료</span>
    </div>
  </div>

  <div class="chapter-section">
    
    <a href="therapy08.html" class="chapter-card">
      <div class="chapter-num">CH 08</div>
      <div class="chapter-info">
        <div class="chapter-title">정신역동적 가족치료</div>
        <div class="chapter-tags">
          <span class="mini-tag">대상관계</span>
          <span class="mini-tag">투사적 동일시</span>
        </div>
      </div>
      <div class="btn-enter">완료</div>
    </a>

    <a href="therapy09.html" class="chapter-card">
      <div class="chapter-num">CH 09-1</div>
      <div class="chapter-info">
        <div class="chapter-title">인지행동 가족치료 1</div>
        <div class="chapter-tags">
          <span class="mini-tag">행동주의</span>
          <span class="mini-tag">ABC 모형</span>
        </div>
      </div>
      <div class="btn-enter">완료</div>
    </a>

    <a href="therapy09_2.html" class="chapter-card">
      <div class="chapter-num">CH 09-2</div>
      <div class="chapter-info">
        <div class="chapter-title">인지행동 가족치료 2</div>
        <div class="chapter-tags">
          <span class="mini-tag">핵심신념</span>
          <span class="mini-tag">하향화살표</span>
          <span class="mini-tag">가족도식</span>
        </div>
      </div>
      <div class="btn-enter">완료</div>
    </a>

    <a href="#" class="chapter-card" style="opacity: 0.5; border-style: dashed;">
      <div class="chapter-num">CH 10</div>
      <div class="chapter-info">
        <div class="chapter-title" style="color: var(--muted);">다음 챕터 업데이트 대기 중</div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
