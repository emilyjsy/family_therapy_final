<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Therapy Exam Portal — 가족치료 기말고사 포털</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2336;
    --border: #2a3050;
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.1);
    --amber: #fbbf24;
    --rose: #fb7185;
    --violet: #a78bfa;
    --sky: #38bdf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    padding-bottom: 100px;
  }

  header {
    background: linear-gradient(180deg, rgba(26,31,53,1) 0%, var(--bg) 100%);
    padding: 80px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .portal-label {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--teal);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(28px, 6vw, 48px);
    margin-bottom: 12px;
    color: #fff;
  }
  header h1 span { color: var(--teal); }
  .header-desc {
    color: var(--muted);
    font-size: 15px;
    max-width: 600px;
    margin: 0 auto;
  }

  .container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
  }
  .stat-value {
    display: block;
    font-size: 24px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .stat-label { font-size: 13px; color: var(--muted); }

  .chapter-section {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  
  .chapter-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 24px;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .chapter-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--muted);
    transition: background 0.3s;
  }
  .chapter-card:hover {
    transform: translateY(-4px);
    border-color: var(--teal);
    background: rgba(45,212,191,0.03);
    box-shadow: 0 12px 24px rgba(0,0,0,0.2);
  }
  .chapter-card:hover::before { background: var(--teal); }

  .chapter-num {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 700;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
  }
  .chapter-card:hover .chapter-num { color: var(--teal); }

  .chapter-info { flex-grow: 1; }
  .chapter-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .chapter-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .mini-tag {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .chapter-status {
    text-align: right;
    margin-left: 20px;
  }
  .btn-enter {
    background: var(--teal-dim);
    border: 1px solid var(--teal);
    color: var(--teal);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .done::before { background: var(--teal) !important; }
  .done .chapter-num { color: var(--teal); }
</style>
</head>
<body>

<header>
  <div class="portal-label">Final Exam Study Hub</div>
  <h1>가족치료 <span>기말고사</span> 포털</h1>
  <p class="header-desc">각 챕터별 핵심 정리 및 퀴즈 페이지로 이동합니다.</p>
</header>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-value">12</span>
      <span class="stat-label">시험 범위 챕터</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" style="color:var(--amber)">1 / 12</span>
      <span class="stat-label">학습 완료</span>
    </div>
  </div>

  <div class="chapter-section">
    
    <a href="therapy08.html" class="chapter-card done">
      <div class="chapter-num">08</div>
      <div class="chapter-info">
        <div class="chapter-title">정신역동적 가족치료</div>
        <div class="chapter-tags">
          <span class="mini-tag">대상관계이론</span>
          <span class="mini-tag">투사적 동일시</span>
          <span class="mini-tag">전이/역전이</span>
        </div>
      </div>
      <div class="chapter-status">
        <span class="btn-enter">학습 완료</span>
      </div>
    </a>

    <a href="#" class="chapter-card">
      <div class="chapter-num">09</div>
      <div class="chapter-info">
        <div class="chapter-title">보웬의 다세대 가족치료</div>
        <div class="chapter-tags">
          <span class="mini-tag">자기분화</span>
          <span class="mini-tag">삼각관계</span>
        </div>
      </div>
      <div class="chapter-status">
        <span class="btn-enter" style="border-color:var(--border); color:var(--muted); background:none;">준비 중</span>
      </div>
    </a>

  </div>
</div>

</body>
</html>
